appId: com.zhangferry-dev.tokendash
productName: TokenDash
directories:
  output: release
files:
  - dist/**/*
  - bin/**/*
  - electron/**/*
  - package.json
mac:
  target: dmg
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  identity: null
  darkModeSupport: true
  minimumSystemVersion: '14.0'
  extendInfo:
    LSUIElement: true
extraMetadata:
  main: electron/main.cjs
